<!DOCTYPE html>
<!--
  This file exists solely so Netlify detects the RSVP form at build time.
  React renders the form dynamically, so Netlify needs this static fallback
  to register the form. Do not delete this file.
-->
<html>
  <body>
    <form name="rsvp" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text"     name="bot-field"    />
      <input type="text"     name="name"         />
      <input type="text"     name="guests"       />
      <input type="text"     name="attending"    />
      <input type="text"     name="guest-name-2" />
      <input type="text"     name="guest-name-3" />
      <input type="text"     name="guest-name-4" />
      <input type="text"     name="guest-name-5" />
      <input type="text"     name="guest-name-6" />
      <input type="text"     name="guest-name-7" />
      <input type="text"     name="guest-name-8" />
      <textarea              name="note"         ></textarea>
    </form>
  </body>
</html>
