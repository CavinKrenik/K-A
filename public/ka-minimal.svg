<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Gold gradient similar to the rings -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#f6e6b6"/>
      <stop offset="22%" stop-color="#d8b565"/>
      <stop offset="55%" stop-color="#b98a2e"/>
      <stop offset="78%" stop-color="#f3dc9a"/>
      <stop offset="100%" stop-color="#c69a3a"/>
    </linearGradient>

    <!-- Soft shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.10"/>
    </filter>

    <!-- Subtle highlight sheen -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Optional badge background (comment out if you want transparent) -->
  <circle cx="256" cy="256" r="250" fill="#ffffff" opacity="0.0"/>

  <g filter="url(#shadow)">
    <!-- Two interlocking rings -->
    <!-- Left ring -->
    <circle cx="224" cy="268" r="118"
            fill="none"
            stroke="url(#gold)"
            stroke-width="22"
            stroke-linecap="round"
            stroke-linejoin="round"/>

    <!-- Right ring -->
    <circle cx="308" cy="268" r="118"
            fill="none"
            stroke="url(#gold)"
            stroke-width="22"
            stroke-linecap="round"
            stroke-linejoin="round"/>

    <!-- Sheen overlays (gives a polished metal vibe) -->
    <path d="M110 220 C150 145, 270 120, 342 165"
          fill="none"
          stroke="url(#sheen)"
          stroke-width="10"
          stroke-linecap="round"
          opacity="0.55"/>

    <path d="M170 372 C235 420, 340 405, 400 350"
          fill="none"
          stroke="#000"
          stroke-width="10"
          stroke-linecap="round"
          opacity="0.06"/>

    <!-- Monogram -->
    <!-- NOTE: This uses a font stack; if you want it to match *exactly*,
         open this SVG in Illustrator/Inkscape and convert text to outlines. -->
    <text x="256" y="285"
          text-anchor="middle"
          font-size="92"
          font-weight="400"
          letter-spacing="1"
          fill="#6f4a13"
          opacity="0.95"
          style="font-family: 'Cormorant Garamond', 'Playfair Display', 'Times New Roman', serif;">
      K&amp;A
    </text>

    <!-- Thin outer rim (optional) -->
    <circle cx="256" cy="256" r="238" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.65"/>
  </g>
</svg>